<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재난의학 서바이벌 — 관리자 대시보드</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0e1118;--surface:#1a1d27;--surface2:#252836;--border:#2e3142;--text:#eef0f6;--text2:#8b8fa3;--accent:#448aff;--red:#ff3b5c;--green:#00e676;--yellow:#ffca28;--purple:#b388ff;--orange:#ff9100;--cyan:#00e5ff}
body{font-family:'Pretendard','Noto Sans KR',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;max-width:400px;width:100%;text-align:center}
.login-box h1{font-size:1.5rem;margin-bottom:8px}
.login-box p{color:var(--text2);font-size:0.9rem;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:1rem;margin-bottom:16px;outline:none}
.login-box input:focus{border-color:var(--accent)}
.login-box button{width:100%;padding:12px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-size:1rem;font-weight:600;cursor:pointer}
.login-box button:hover{opacity:0.9}
.login-error{color:var(--red);font-size:0.85rem;margin-top:8px}

/* Dashboard */
.dashboard{display:none;padding:20px;max-width:1400px;margin:0 auto}
.dash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.dash-header h1{font-size:1.4rem;display:flex;align-items:center;gap:8px}
.dash-header h1 span{font-size:0.75rem;background:var(--accent);padding:2px 8px;border-radius:4px;vertical-align:middle}
.header-actions{display:flex;gap:8px}
.header-actions button{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);cursor:pointer;font-size:0.85rem}
.header-actions button:hover{border-color:var(--accent)}
.header-actions button.danger{border-color:var(--red);color:var(--red)}
.header-actions button.danger:hover{background:var(--red);color:#fff}

/* Stats Grid */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.stat-card .label{font-size:0.8rem;color:var(--text2);margin-bottom:4px}
.stat-card .value{font-size:2rem;font-weight:700;line-height:1.2}
.stat-card .sub{font-size:0.75rem;color:var(--text2);margin-top:4px}
.stat-card.accent .value{color:var(--accent)}
.stat-card.green .value{color:var(--green)}
.stat-card.yellow .value{color:var(--yellow)}
.stat-card.red .value{color:var(--red)}
.stat-card.purple .value{color:var(--purple)}

/* Sections */
.section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.section h2{font-size:1.1rem;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section h2 .icon{font-size:1.2rem}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:0.85rem}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--text2);font-weight:500;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.5px}
td{color:var(--text)}
tr:hover td{background:rgba(68,138,255,0.05)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.75rem;font-weight:600}
.badge-red{background:rgba(255,59,92,0.15);color:var(--red)}
.badge-green{background:rgba(0,230,118,0.15);color:var(--green)}
.badge-yellow{background:rgba(255,202,40,0.15);color:var(--yellow)}
.badge-blue{background:rgba(68,138,255,0.15);color:var(--accent)}
.badge-purple{background:rgba(179,136,255,0.15);color:var(--purple)}

/* Progress bar */
.progress{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-bar{height:100%;border-radius:3px;transition:width 0.5s ease}

/* Mode stats */
.mode-stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.mode-stat-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px}
.mode-stat-card h3{font-size:0.95rem;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.mode-stat-card .stats-row{display:flex;justify-content:space-between;margin-top:8px;font-size:0.8rem;color:var(--text2)}
.mode-stat-card .stats-row span:last-child{color:var(--text);font-weight:600}

/* Charts placeholder */
.chart-area{height:200px;background:var(--bg);border-radius:8px;display:flex;align-items:flex-end;padding:20px;gap:4px}
.chart-bar{background:var(--accent);border-radius:3px 3px 0 0;min-width:8px;flex:1;transition:height 0.3s ease;position:relative}
.chart-bar:hover{opacity:0.8}
.chart-bar .tooltip{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--surface2);padding:4px 8px;border-radius:4px;font-size:0.7rem;white-space:nowrap;color:var(--text)}
.chart-bar:hover .tooltip{display:block}

/* Search */
.search-bar{display:flex;gap:8px;margin-bottom:16px}
.search-bar input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:0.9rem;outline:none}
.search-bar input:focus{border-color:var(--accent)}
.search-bar button{padding:10px 20px;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer;font-size:0.9rem}

/* Pagination */
.pagination{display:flex;justify-content:center;gap:8px;margin-top:16px}
.pagination button{padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);cursor:pointer;font-size:0.8rem}
.pagination button.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pagination button:hover{border-color:var(--accent)}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto}
.tab{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text2);cursor:pointer;font-size:0.85rem;white-space:nowrap}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tab:hover{border-color:var(--accent)}

/* Session detail modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:800px;width:100%;max-height:80vh;overflow-y:auto;padding:24px}
.modal h2{margin-bottom:16px}
.modal-close{float:right;background:none;border:none;color:var(--text2);font-size:1.5rem;cursor:pointer}
.modal-close:hover{color:var(--text)}

/* Responsive */
@media(max-width:768px){
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .mode-stat-grid{grid-template-columns:1fr}
  table{font-size:0.75rem}
  th,td{padding:6px 8px}
  .dash-header{flex-direction:column;align-items:flex-start}
}
@media(max-width:480px){
  .stat-grid{grid-template-columns:1fr}
  .tabs{flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-section">
  <div class="login-box">
    <h1>🏥 관리자 대시보드</h1>
    <p>재난의학 서바이벌 교육 관리 시스템</p>
    <input type="password" id="admin-pw" placeholder="관리자 비밀번호 입력" autocomplete="off">
    <button onclick="doLogin()">로그인</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="dash-header">
    <h1>🏥 재난의학 서바이벌 <span>관리자</span></h1>
    <div class="header-actions">
      <button onclick="refreshDashboard()">🔄 새로고침</button>
      <button onclick="exportCSV()">📊 CSV 내보내기</button>
      <button class="danger" onclick="clearData()">🗑️ 데이터 초기화</button>
      <button onclick="logout()">로그아웃</button>
    </div>
  </div>

  <!-- Overview Stats -->
  <div class="stat-grid" id="stat-grid"></div>

  <!-- Tabs -->
  <div class="tabs" id="main-tabs">
    <div class="tab active" data-tab="overview" onclick="switchTab('overview')">📊 종합 현황</div>
    <div class="tab" data-tab="sessions" onclick="switchTab('sessions')">👥 교육생 목록</div>
    <div class="tab" data-tab="questions" onclick="switchTab('questions')">❓ 문항 분석</div>
    <div class="tab" data-tab="modes" onclick="switchTab('modes')">🎮 모드별 분석</div>
  </div>

  <!-- Tab Content -->
  <div id="tab-overview" class="tab-content">
    <div class="section">
      <h2><span class="icon">📈</span> 일별 참여 추이 (최근 30일)</h2>
      <div class="chart-area" id="daily-chart"></div>
    </div>
    <div class="section">
      <h2><span class="icon">🎮</span> 모드별 성과</h2>
      <div class="mode-stat-grid" id="mode-stats"></div>
    </div>
    <div class="section">
      <h2><span class="icon">⚠️</span> 가장 어려운 문항 (오답률 높은 순)</h2>
      <table id="hard-questions-table">
        <thead><tr><th>문항 ID</th><th>모드</th><th>응시 수</th><th>정답률</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div id="tab-sessions" class="tab-content" style="display:none">
    <div class="section">
      <h2><span class="icon">👥</span> 교육생 세션 목록</h2>
      <div class="search-bar">
        <input type="text" id="search-nickname" placeholder="닉네임 검색...">
        <button onclick="searchSessions()">검색</button>
      </div>
      <table id="sessions-table">
        <thead><tr><th>닉네임</th><th>시작 시간</th><th>총점</th><th>레벨</th><th>최대 연속</th><th>완료 모드</th><th>상세</th></tr></thead>
        <tbody></tbody>
      </table>
      <div class="pagination" id="sessions-pagination"></div>
    </div>
  </div>

  <div id="tab-questions" class="tab-content" style="display:none">
    <div class="section">
      <h2><span class="icon">❓</span> 문항별 정답률 분석</h2>
      <div class="tabs" id="mode-filter-tabs">
        <div class="tab active" onclick="filterQuestions('')">전체</div>
        <div class="tab" onclick="filterQuestions('triage')">Triage</div>
        <div class="tab" onclick="filterQuestions('quiz')">퀴즈</div>
        <div class="tab" onclick="filterQuestions('cbrne')">CBRNE</div>
        <div class="tab" onclick="filterQuestions('mci')">MCI</div>
        <div class="tab" onclick="filterQuestions('ethics')">윤리</div>
        <div class="tab" onclick="filterQuestions('leadership')">리더십</div>
        <div class="tab" onclick="filterQuestions('teamwork')">팀워크</div>
      </div>
      <table id="question-analytics-table">
        <thead><tr><th>문항 ID</th><th>모드</th><th>응시 수</th><th>정답 수</th><th>정답률</th><th>평균 소요시간</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div id="tab-modes" class="tab-content" style="display:none">
    <div class="section">
      <h2><span class="icon">🎮</span> 모드별 상세 분석</h2>
      <div class="mode-stat-grid" id="mode-detail-stats"></div>
    </div>
  </div>
</div>

<!-- Session Detail Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
const API = (() => {
  const p = '__PORT_8000__';
  return p.startsWith('__') ? 'http://localhost:8000' : p;
})();

let adminToken = '';
let currentTab = 'overview';
let dashboardData = null;

// === AUTH ===
async function doLogin() {
  const pw = document.getElementById('admin-pw').value;
  try {
    const res = await fetch(`${API}/api/admin/login`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password: pw})
    });
    if (!res.ok) throw new Error('인증 실패');
    const data = await res.json();
    adminToken = data.token;
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    refreshDashboard();
  } catch(e) {
    document.getElementById('login-error').textContent = '비밀번호가 틀렸습니다';
  }
}

document.getElementById('admin-pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function logout() {
  adminToken = '';
  document.getElementById('login-section').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('admin-pw').value = '';
}

function authHeaders() {
  return {'Authorization': `Bearer ${adminToken}`, 'Content-Type': 'application/json'};
}

// === DASHBOARD ===
async function refreshDashboard() {
  try {
    const res = await fetch(`${API}/api/admin/dashboard`, {headers: authHeaders()});
    if (!res.ok) { logout(); return; }
    dashboardData = await res.json();
    renderOverview();
    renderModeStats();
    renderHardQuestions();
    renderDailyChart();
  } catch(e) {
    console.error(e);
  }
}

function renderOverview() {
  const o = dashboardData.overview;
  document.getElementById('stat-grid').innerHTML = `
    <div class="stat-card accent">
      <div class="label">총 교육 세션</div>
      <div class="value">${o.total_sessions}</div>
      <div class="sub">오늘 ${o.today_sessions}건</div>
    </div>
    <div class="stat-card green">
      <div class="label">완료율</div>
      <div class="value">${o.completion_rate}%</div>
      <div class="sub">${o.total_completed}/${o.total_sessions} 완료</div>
    </div>
    <div class="stat-card yellow">
      <div class="label">평균 점수</div>
      <div class="value">${Math.round(o.avg_score)}</div>
      <div class="sub">완료 세션 기준</div>
    </div>
    <div class="stat-card purple">
      <div class="label">오늘 참여자</div>
      <div class="value">${o.today_sessions}</div>
      <div class="sub">${new Date().toLocaleDateString('ko-KR')}</div>
    </div>
  `;
}

const MODE_NAMES = {
  triage: {icon: '🚑', name: 'START Triage', color: 'var(--red)'},
  quiz: {icon: '📋', name: '재난의학 퀴즈', color: 'var(--green)'},
  cbrne: {icon: '☢️', name: 'CBRNE 대응', color: 'var(--purple)'},
  mci: {icon: '🏥', name: 'MCI 지휘관', color: 'var(--yellow)'},
  ethics: {icon: '⚖️', name: '윤리적 딜레마', color: 'var(--cyan)'},
  leadership: {icon: '🎖️', name: '리더십 챌린지', color: 'var(--purple)'},
  teamwork: {icon: '🤝', name: '팀워크 미션', color: 'var(--orange)'},
  boss: {icon: '👹', name: '보스 라운드', color: 'var(--red)'}
};

function renderModeStats() {
  const stats = dashboardData.mode_stats;
  const container = document.getElementById('mode-stats');
  const detailContainer = document.getElementById('mode-detail-stats');
  
  const html = stats.map(s => {
    const m = MODE_NAMES[s.mode] || {icon: '🎯', name: s.mode, color: 'var(--accent)'};
    const acc = s.avg_accuracy || 0;
    const barColor = acc >= 80 ? 'var(--green)' : acc >= 60 ? 'var(--yellow)' : 'var(--red)';
    return `
      <div class="mode-stat-card">
        <h3>${m.icon} ${m.name}</h3>
        <div class="stats-row"><span>시도 횟수</span><span>${s.attempts}회</span></div>
        <div class="stats-row"><span>평균 점수</span><span>${Math.round(s.avg_score || 0)}점</span></div>
        <div class="stats-row"><span>평균 정답률</span><span>${Math.round(acc)}%</span></div>
        <div class="progress"><div class="progress-bar" style="width:${acc}%;background:${barColor}"></div></div>
        <div class="stats-row"><span>평균 소요시간</span><span>${Math.round(s.avg_time || 0)}초</span></div>
      </div>
    `;
  }).join('');
  
  container.innerHTML = html || '<p style="color:var(--text2);text-align:center;padding:20px">아직 데이터가 없습니다</p>';
  detailContainer.innerHTML = html || '<p style="color:var(--text2);text-align:center;padding:20px">아직 데이터가 없습니다</p>';
}

function renderHardQuestions() {
  const tbody = document.querySelector('#hard-questions-table tbody');
  const qs = dashboardData.hard_questions;
  tbody.innerHTML = qs.map(q => {
    const acc = Math.round(q.accuracy || 0);
    const cls = acc < 30 ? 'badge-red' : acc < 60 ? 'badge-yellow' : 'badge-green';
    return `<tr>
      <td>${q.question_id}</td>
      <td><span class="badge badge-blue">${q.mode}</span></td>
      <td>${q.total_attempts}</td>
      <td><span class="badge ${cls}">${acc}%</span></td>
    </tr>`;
  }).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--text2)">데이터 부족 (최소 3회 응시 필요)</td></tr>';
}

function renderDailyChart() {
  const chart = document.getElementById('daily-chart');
  const data = dashboardData.daily_trend;
  if (!data.length) {
    chart.innerHTML = '<p style="color:var(--text2);text-align:center;width:100%;align-self:center">아직 데이터가 없습니다</p>';
    return;
  }
  const maxSessions = Math.max(...data.map(d => d.sessions), 1);
  chart.innerHTML = data.map(d => {
    const h = Math.max(d.sessions / maxSessions * 160, 4);
    const date = d.date.slice(5);
    return `<div class="chart-bar" style="height:${h}px">
      <div class="tooltip">${date}: ${d.sessions}건, 평균 ${Math.round(d.avg_score || 0)}점</div>
    </div>`;
  }).join('');
}

// === SESSIONS ===
let sessionsPage = 1;

async function searchSessions() {
  sessionsPage = 1;
  await loadSessions();
}

async function loadSessions(page) {
  if (page) sessionsPage = page;
  const search = document.getElementById('search-nickname').value;
  const res = await fetch(`${API}/api/admin/sessions?page=${sessionsPage}&search=${encodeURIComponent(search)}`, {headers: authHeaders()});
  const data = await res.json();
  
  const tbody = document.querySelector('#sessions-table tbody');
  tbody.innerHTML = data.sessions.map(s => {
    const modes = JSON.parse(s.modes_completed || '[]');
    const modeBadges = modes.map(m => {
      const info = MODE_NAMES[m] || {icon:'🎯', name:m};
      return `<span class="badge badge-blue">${info.icon}</span>`;
    }).join(' ');
    return `<tr>
      <td><strong>${s.nickname}</strong></td>
      <td>${new Date(s.started_at).toLocaleString('ko-KR')}</td>
      <td>${s.total_score}</td>
      <td>Lv.${s.max_level}</td>
      <td>${s.max_streak}</td>
      <td>${modeBadges || '-'}</td>
      <td><button onclick="viewSession('${s.session_id}')" style="padding:4px 8px;border:1px solid var(--accent);border-radius:4px;background:transparent;color:var(--accent);cursor:pointer;font-size:0.75rem">상세</button></td>
    </tr>`;
  }).join('') || '<tr><td colspan="7" style="text-align:center;color:var(--text2)">교육생 데이터가 없습니다</td></tr>';
  
  // Pagination
  const totalPages = Math.ceil(data.total / data.per_page);
  const pag = document.getElementById('sessions-pagination');
  if (totalPages > 1) {
    let buttons = '';
    for (let i = 1; i <= Math.min(totalPages, 10); i++) {
      buttons += `<button class="${i === sessionsPage ? 'active' : ''}" onclick="loadSessions(${i})">${i}</button>`;
    }
    pag.innerHTML = buttons;
  } else {
    pag.innerHTML = '';
  }
}

async function viewSession(sessionId) {
  const res = await fetch(`${API}/api/admin/session/${sessionId}`, {headers: authHeaders()});
  const data = await res.json();
  const s = data.session;
  const modes = data.mode_results;
  const responses = data.question_responses;
  
  document.getElementById('modal-content').innerHTML = `
    <h2>📋 ${s.nickname} 세션 상세</h2>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">
      <div class="stat-card"><div class="label">총점</div><div class="value" style="font-size:1.5rem">${s.total_score}</div></div>
      <div class="stat-card"><div class="label">레벨</div><div class="value" style="font-size:1.5rem">Lv.${s.max_level}</div></div>
      <div class="stat-card"><div class="label">최대 연속 정답</div><div class="value" style="font-size:1.5rem">${s.max_streak}</div></div>
    </div>
    <p style="color:var(--text2);font-size:0.85rem;margin-bottom:16px">
      시작: ${new Date(s.started_at).toLocaleString('ko-KR')} | 
      종료: ${s.ended_at ? new Date(s.ended_at).toLocaleString('ko-KR') : '진행 중'} |
      디바이스: ${s.device_info || '알 수 없음'}
    </p>
    <h3 style="margin-bottom:8px">🎮 모드별 결과</h3>
    <table>
      <thead><tr><th>모드</th><th>점수</th><th>정답/총문항</th><th>소요시간</th></tr></thead>
      <tbody>${modes.map(m => {
        const info = MODE_NAMES[m.mode] || {icon:'🎯', name:m.mode};
        return `<tr>
          <td>${info.icon} ${info.name}</td>
          <td>${m.score}점</td>
          <td>${m.correct_answers}/${m.total_questions}</td>
          <td>${m.time_spent_sec}초</td>
        </tr>`;
      }).join('') || '<tr><td colspan="4">모드 결과 없음</td></tr>'}</tbody>
    </table>
    <h3 style="margin:16px 0 8px">📝 문항별 응답 (최근 50개)</h3>
    <table>
      <thead><tr><th>문항</th><th>모드</th><th>선택 답</th><th>정답여부</th><th>소요시간</th></tr></thead>
      <tbody>${responses.slice(0, 50).map(r => `<tr>
        <td>${r.question_id}</td>
        <td>${r.mode}</td>
        <td>${r.selected_answer}</td>
        <td>${r.is_correct ? '<span class="badge badge-green">O</span>' : '<span class="badge badge-red">X</span>'}</td>
        <td>${r.time_taken_sec}초</td>
      </tr>`).join('') || '<tr><td colspan="5">응답 데이터 없음</td></tr>'}</tbody>
    </table>
  `;
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

// === QUESTION ANALYTICS ===
async function filterQuestions(mode) {
  document.querySelectorAll('#mode-filter-tabs .tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  
  const res = await fetch(`${API}/api/admin/analytics/questions?mode=${mode}`, {headers: authHeaders()});
  const data = await res.json();
  
  const tbody = document.querySelector('#question-analytics-table tbody');
  tbody.innerHTML = data.questions.map(q => {
    const acc = Math.round(q.accuracy || 0);
    const cls = acc < 30 ? 'badge-red' : acc < 60 ? 'badge-yellow' : 'badge-green';
    return `<tr>
      <td>${q.question_id}</td>
      <td><span class="badge badge-blue">${q.mode}</span></td>
      <td>${q.total_attempts}</td>
      <td>${q.correct_count}</td>
      <td><span class="badge ${cls}">${acc}%</span></td>
      <td>${Math.round(q.avg_time || 0)}초</td>
    </tr>`;
  }).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--text2)">데이터 없음</td></tr>';
}

// === TABS ===
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('#main-tabs .tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`#main-tabs .tab[data-tab="${tab}"]`).classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  document.getElementById(`tab-${tab}`).style.display = 'block';
  
  if (tab === 'sessions') loadSessions();
  if (tab === 'questions') filterQuestions('');
}

// === EXPORT & CLEAR ===
async function exportCSV() {
  const res = await fetch(`${API}/api/admin/export/csv`, {headers: authHeaders()});
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `students_export_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

async function clearData() {
  if (!confirm('⚠️ 모든 교육생 데이터가 영구 삭제됩니다. 계속하시겠습니까?')) return;
  if (!confirm('정말로 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) return;
  await fetch(`${API}/api/admin/sessions/clear`, {method: 'DELETE', headers: authHeaders()});
  refreshDashboard();
}
</script>
